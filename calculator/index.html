<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="JavaScript Calculator" />
    <meta name="keywords" content="JavaScript, HTML, CSS" />
    <meta name="author" content="Shakera Couch" />
    <title>JavaScript Calculator</title>
    <link href="assets/css/style.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.1/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.1/dist/additional-methods.min.js"></script>
  </head>
  <body>
    <form id="myform">
      <div class="formcontainer" onsubmit="return false;">
        <h1>Calculator</h1>
        <fieldset id="detail">
          <legend>Calculator</legend>
          <br />

          <label class="formlabel" for="Operand1">Operand 1: </label>
          <input
            type="text"
            id="Operand1"
            name="Operand1"
            size="15"
            maxlength="15"
            data-rule-required="true"
            data-msg-required="Operand 1 is Required"
            data-rule-number="true"
            data-msg-number="Operand 1 must be a Number" />
          <label class="error" for="Operand1" id="Operand1Error"></label>
          <br /><br />

          <label class="formlabel" for="Operand2">Operand 2: </label>
          <input
            type="text"
            id="Operand2"
            name="Operand2"
            size="15"
            maxlength="15"
            data-rule-required="true"
            data-msg-required="Operand 2 is Required"
            data-rule-number="true"
            data-msg-number="Operand 2 must be a Number" />
          <label class="error" for="Operand2" id="Operand2Error"></label>
          <br /><br />

          <label class="formlabel">Operator: </label>
          <label for="AddOperator">
            <input
              type="radio"
              name="Operator"
              id="AddOperator"
              value="Add"
              data-rule-required="true"
              data-msg-required="Operator is Required" />Add
          </label>
          <label for="SubOperator">
            <input
              type="radio"
              name="Operator"
              id="SubOperator"
              value="Sub" />Subtract
          </label>
          <label for="MulOperator">
            <input
              type="radio"
              name="Operator"
              id="MulOperator"
              value="Mul" />Multiply
          </label>
          <label for="DivOperator">
            <input
              type="radio"
              name="Operator"
              id="DivOperator"
              value="Div" />Divide
          </label>
          <label for="Operator" class="error" id="OperatorError"></label>
          <br /><br />

          <label class="formlabel">Result: </label>
          <span id="Result"></span>
          <br /><br />

          <input
            type="button"
            value="Calculate"
            name="Calculate"
            onclick="calculate()" />
          <input
            type="button"
            value="Clear"
            name="Clear"
            onclick="clearform()"
            novalidate />
        </fieldset>
      </div>
    </form>
    <script>
    // Initialize jQuery Validation
    $(document).ready(function () {
        $("#myform").validate({
            errorPlacement: function (error, element) {
                if (element.attr("name") === "Operator") {
                    error.appendTo("#OperatorError");
                } else {
                    error.appendTo("#" + element.attr("id") + "Error");
                }
            }
        });
    });

    function calculate() {
        // Validate the form before calculating
        if (!$("#myform").valid()) return;

        const operand1 = parseFloat(document.getElementById("Operand1").value);
        const operand2 = parseFloat(document.getElementById("Operand2").value);
        const operator = document.querySelector('input[name="Operator"]:checked');
        let result = "";

        if (!operator) {
            document.getElementById("Result").textContent = "Please select an operator.";
            return;
        }

        switch (operator.value) {
            case "Add":
                result = operand1 + operand2;
                break;
            case "Sub":
                result = operand1 - operand2;
                break;
            case "Mul":
                result = operand1 * operand2;
                break;
            case "Div":
                if (operand2 === 0) {
                    result = "Error: Cannot divide by zero";
                } else {
                    result = operand1 / operand2;
                }
                break;
            default:
                result = "Invalid operator";
        }

        // Round to avoid floating point display issues
        if (typeof result === "number") {
            result = parseFloat(result.toFixed(10));
        }

        document.getElementById("Result").textContent = result;
    }

    function clearform() {
        document.getElementById("Operand1").value = "";
        document.getElementById("Operand2").value = "";
        document.querySelectorAll('input[name="Operator"]').forEach(r => r.checked = false);
        document.getElementById("Result").textContent = "";

        // Clear any validation error messages
        if ($("#myform").data("validator")) {
            $("#myform").data("validator").resetForm();
        }
        $(".error").text("");
    }
</script>
  </body>
</html>
>
